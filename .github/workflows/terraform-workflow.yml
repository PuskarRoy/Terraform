---
name: Terraform Github Action Workflow
on:
  workflow_dispatch:
  push:
    branches:
      - main
permissions:
  id-token: write
  contents: read
env:
  TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - name: Get code from Github Repository
        uses: actions/checkout@v6
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with: 
          aws-region: ap-south-1
          role-to-assume: arn:aws:iam::388458311239:role/github-action-role
      - name: Create Terraform Plugin Cache Dir
        run: mkdir -p ${{ env.TF_PLUGIN_CACHE_DIR }}
      - name: Installing Terraform
        uses: hashicorp/setup-terraform@v4
        with: 
          terraform_version: "1.13"
      - name: Cache Terraform Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: terraform-cache-${{ hashFiles('**/.terraform.lock.hcl') }}
      - name: Terraform Initialization
        run: terraform init -no-color
      - name: Teraform Validation
        run: terraform validate -no-color 
      - name: Terraform Plan
        run: terraform plan -no-color -out=main.tfplan
      - name: Terraform Plan Upload
        uses: actions/upload-artifact@v7
        with:
          name: tfplan
          path: ./main.tfplan
  deploy:
    runs-on: ubuntu-latest
    needs: plan
    steps:
      - name: Get code from Github Repository
        uses: actions/checkout@v6
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with: 
          aws-region: ap-south-1
          role-to-assume: arn:aws:iam::388458311239:role/github-action-role
      - name: Create Terraform Plugin Cache Dir
        run: mkdir -p ${{ env.TF_PLUGIN_CACHE_DIR }}
      - name: Installing Terraform
        uses: hashicorp/setup-terraform@v4
        with: 
          terraform_version: "1.13"
      - name: Cache Terraform Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: terraform-cache-${{ hashFiles('**/.terraform.lock.hcl') }}
      - name: Terraform Initialization
        run: terraform init -no-color
      - name: Download Terraform Plan
        uses: actions/download-artifact@v7
        with:
          name: tfplan
          path: .
      - name: Terraform Apply
        run: terraform apply -auto-approve -no-color main.tfplan
       